name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'pull_request_review_comment' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       github.event.issue.pull_request)
    runs-on: ubuntu-latest
    concurrency:
      group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@22891970a71915a0bff651b093e5be2b99f336ba # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "coderabbitai,claude"
          claude_args: '--max-turns 15 --allowedTools "Read,Glob,Grep,Bash(git diff:*),Bash(git log:*),Bash(git show:*)"'
          prompt: |
            Review this PR. First, read CLAUDE.md to understand the project's architecture, conventions, and policies. Then check the diff against these criteria:

            1. **Codebase compatibility**: Does the new code match the project's existing naming conventions, import patterns, code style, and architectural patterns? Use Read to examine existing files in the same directories and compare.
            2. **Code reuse**: Did the author reuse existing utilities, helpers, components, and abstractions? Use Grep to search the codebase for similar functionality. Flag any case where the PR creates something that already exists.
            3. **Security**: No exposed secrets, proper input validation, no injection vectors, no hardcoded credentials.
            4. **Architecture**: Follows existing patterns documented in CLAUDE.md. No unnecessary abstractions or over-engineering.
            5. **Tests**: New features have tests. Verify test files exist and cover the key paths. Check test quality by reading the test code.
            6. **Tech debt**: Does this PR introduce new tech debt? Flag: TODO/FIXME/HACK comments, copy-pasted code, pattern violations, workarounds that bypass established conventions. Minor tech debt cleanup in touched files is expected and encouraged.
            7. **Code quality**: No dead code, no dead imports, no unnecessary complexity.

            # TODO: Add project-specific review criteria here. Examples:
            # - Data isolation checks (multi-tenant apps)
            # - No mock/fake data in production code
            # - Compliance requirements
            # - Performance considerations

            # TODO: Define critical paths that require human review. Example:
            # If the PR touches src/lib/auth/ or src/lib/db/:
            # - Flag as REQUIRES HUMAN REVIEW in your summary

            ## Important constraints

            - You are a READ-ONLY reviewer. You can read files (Read, Glob, Grep) and inspect git history (git diff, git log, git show). That is all.
            - Do NOT attempt to run tests, linters, or any Python/Node commands. You cannot execute code.
            - Do NOT try to post your review via `gh` commands or write files. The action framework will post your review output automatically.
            - Write your review findings as your final message. Use specific file:line references.
